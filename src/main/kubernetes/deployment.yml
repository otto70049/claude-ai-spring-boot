apiVersion: apps/v1
kind: Deployment
metadata:
  name: person-service
  labels:
    app: person-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: person-service
  template:
    metadata:
      labels:
        app: person-service
    spec:
      containers:
        - name: person-service
          image: person-service:latest
          ports:
            - containerPort: 8080
          env:
            - name: POSTGRES_HOST
              valueFrom:
                configMapKeyRef:
                  name: person-config
                  key: postgres.host
            - name: POSTGRES_PORT
              valueFrom:
                configMapKeyRef:
                  name: person-config
                  key: postgres.port
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: person-config
                  key: postgres.db
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: person-secret
                  key: postgres.user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: person-secret
                  key: postgres.password
            - name: JWT_ISSUER_URI
              valueFrom:
                configMapKeyRef:
                  name: person-config
                  key: jwt.issuer-uri
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 5
